<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VENSIS Project</title><style>:root{--g:#006b3c;--d:#173f46;--l:#dfe7e2;--s:#f4f7f5;--t:#17342b}*{box-sizing:border-box}body{margin:0;font-family:Arial;background:var(--s);color:var(--t)}.top{padding:14px 20px;background:linear-gradient(135deg,#004f2d,#006b3c);color:#fff;display:flex;justify-content:space-between;gap:12px;align-items:center}.top h1{margin:0;font-size:21px}.save-state{display:inline-flex;align-items:center;gap:5px;margin-top:5px;font-size:12px;font-weight:800;color:#d9ffe9}.top-actions{display:flex;gap:8px;flex-wrap:wrap}button{border:0;border-radius:8px;padding:10px 13px;font-weight:700;cursor:pointer}.primary{background:#fff;color:var(--g);border:1px solid #fff}.secondary{background:#fff;color:var(--d);border:1px solid var(--d)}.wrap{max-width:1200px;margin:18px auto;padding:0 14px}.card{background:#fff;border:1px solid var(--l);border-radius:10px;overflow:hidden;margin-bottom:14px}.head{padding:12px 15px;background:var(--d);color:#fff}.body{padding:14px}.grid{display:grid;grid-template-columns:2fr 2fr 1fr 1.4fr;gap:10px}.f label{display:block;font-size:12px;font-weight:700;margin-bottom:6px}.f input,.f textarea,.f select{width:100%;padding:10px;border:1px solid #cfdcd4;border-radius:7px;font:inherit}.f textarea{min-height:75px}.table{overflow:auto;border:1px solid var(--l);border-radius:7px}table{width:100%;border-collapse:collapse;min-width:880px}th{background:var(--g);color:#fff;padding:10px;text-align:left;font-size:12px}td{padding:10px;border-bottom:1px solid var(--l);font-size:13px}.qty{width:76px;padding:8px}.icon{width:34px;height:34px;padding:0;border-radius:50%}.summary{text-align:right;padding-top:12px}.empty{text-align:center;padding:45px;color:#718078}@media(max-width:750px){.grid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.top-actions{width:100%;display:grid;grid-template-columns:1fr 1fr}.top button{width:100%}}</style><link rel="stylesheet" href="css/form-state.css"></head><body><div class="top"><div><h1>VENSIS Project</h1></div><div class="top-actions"><button class="primary" onclick="goFanSelectionForActiveProject()">+ Add Fans</button><button class="primary" onclick="location.href='project-report.html'">Preview</button><button class="primary" onclick="convertToQuotation()">Convert to Quotation</button><button class="secondary" onclick="location.href='project.html'">Projects</button><button class="secondary" onclick="goMainPage()">⌂ Home</button></div></div><div class="wrap"><div class="card"><div class="head"><b>Project Information</b></div><div class="body"><div class="grid"><div class="f"><label>Project Name</label><input id="projectName"></div><div class="f"><label>Company Name</label><input id="companyName"></div><div class="f"><label>Date</label><input id="projectDate" type="date"></div><div class="f"><label>Project No.</label><input id="projectNo" readonly></div></div><div class="grid" style="grid-template-columns:1fr 1fr;margin-top:10px"><div class="f"><label>Contact Person</label><input id="contactPerson"></div><div class="f"><label>Email Address</label><input id="customerEmail" type="email"></div></div><div class="grid" style="grid-template-columns:1fr 3fr;margin-top:10px"><div class="f"><label>Status</label><select id="status"><option>Draft</option><option>Completed</option></select></div><div class="f"><label>Notes</label><textarea id="notes"></textarea></div></div></div></div><div class="card"><div class="head"><b>Product List</b></div><div class="body"><div id="content"></div></div></div></div><script>const PROJECTS='vensis_projects_v2',ACTIVE='vensis_active_project_v2',ITEMS='vensis_selection_project_v1',META='vensis_selection_project_meta_v1';function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]))}function loadProjects(){try{return JSON.parse(localStorage.getItem(PROJECTS)||'[]')}catch(e){return []}}function saveProjects(p){localStorage.setItem(PROJECTS,JSON.stringify(p))}function current(){const id=localStorage.getItem(ACTIVE);return loadProjects().find(x=>x.id===id)}function fmt(v,d=0){return new Intl.NumberFormat('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}).format(Number(v)||0)}function showSaved(){}function saveMeta(){const arr=loadProjects(),id=localStorage.getItem(ACTIVE),i=arr.findIndex(x=>x.id===id);if(i<0)return;arr[i].meta={...(arr[i].meta||{}),name:document.getElementById('projectName').value.trim(),companyName:document.getElementById('companyName').value.trim(),customer:document.getElementById('companyName').value.trim(),contactPerson:document.getElementById('contactPerson').value.trim(),email:document.getElementById('customerEmail').value.trim(),date:document.getElementById('projectDate').value,status:document.getElementById('status').value,notes:document.getElementById('notes').value};arr[i].updatedAt=new Date().toISOString();saveProjects(arr);localStorage.setItem(ITEMS,JSON.stringify(arr[i].items||[]));localStorage.setItem(META,JSON.stringify(arr[i].meta));showSaved()}function saveItems(mut){const arr=loadProjects(),id=localStorage.getItem(ACTIVE),i=arr.findIndex(x=>x.id===id);if(i<0)return;mut(arr[i]);arr[i].updatedAt=new Date().toISOString();saveProjects(arr);localStorage.setItem(ITEMS,JSON.stringify(arr[i].items||[]));showSaved()}function init(){const p=current();if(!p){location.href='project.html';return}document.getElementById('projectName').value=p.meta?.name||'';document.getElementById('companyName').value=p.meta?.companyName||p.meta?.customer||'';document.getElementById('contactPerson').value=p.meta?.contactPerson||'';document.getElementById('customerEmail').value=p.meta?.email||'';document.getElementById('projectDate').value=p.meta?.date||'';document.getElementById('projectNo').value=p.meta?.projectNo||'';document.getElementById('status').value=p.meta?.status||'Draft';document.getElementById('notes').value=p.meta?.notes||'';['projectName','companyName','contactPerson','customerEmail','projectDate','status','notes'].forEach(id=>{const el=document.getElementById(id);el.addEventListener('input',saveMeta);el.addEventListener('change',saveMeta)});showSaved();render()}function render(){const p=current(),items=p?.items||[];if(!items.length){content.innerHTML='<div class="empty">No selected products yet.</div>';return}content.innerHTML=`<div class="table"><table><thead><tr><th>Model</th><th>Flow</th><th>Pressure</th><th>Power</th><th>Noise</th><th>Qty</th><th></th></tr></thead><tbody>${items.map(x=>`<tr><td><b>${esc(x.model)}</b></td><td>${fmt(x.flow)} m³/h</td><td>${fmt(x.pressure)} Pa</td><td>${fmt(x.motorPower,2)} kW</td><td>${fmt(x.noise)} dB(A)</td><td><input class="qty" type="number" min="1" value="${x.quantity||1}" onchange="qty('${x.id}',this.value)"></td><td><button class="icon" onclick="del('${x.id}')">×</button></td></tr>`).join('')}</tbody></table></div><div class="summary">Total quantity: <b>${items.reduce((s,x)=>s+(+x.quantity||1),0)}</b></div>`}function qty(id,v){saveItems(p=>{const x=p.items.find(i=>i.id===id);if(x)x.quantity=Math.max(1,Math.round(+v||1))});render()}function del(id){saveItems(p=>p.items=p.items.filter(x=>x.id!==id));render()}function convertToQuotation(){const arr=loadProjects(),id=localStorage.getItem(ACTIVE),i=arr.findIndex(x=>x.id===id);if(i<0)return;arr[i].quotation=arr[i].quotation||{createdAt:new Date().toISOString(),validityDays:30,currency:'EUR',notes:''};arr[i].items=(arr[i].items||[]).map(x=>({...x,discount:Number(x.discount)||0,quotationUnitPrice:Number.isFinite(Number(x.quotationUnitPrice))?Number(x.quotationUnitPrice):Number(x.unitPrice)||0}));arr[i].updatedAt=new Date().toISOString();saveProjects(arr);location.href='quotation-edit.html'}init();</script><script src="js/global-navigation.js"></script><script src="js/form-state.js"></script><script src="js/auth.js?v=20260714-auth1"></script></body></html>
