name: Add global navigation

on:
  push:
    paths:
      - '.github/workflows/add-global-navigation.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add navigation script to application pages
        run: |
          python <<'PY'
          from pathlib import Path

          files=['index.html','project.html','project-edit.html','project-report.html']
          tag='<script src="js/global-navigation.js"></script>'
          for name in files:
              p=Path(name)
              text=p.read_text(encoding='utf-8')
              if tag not in text:
                  text=text.replace('</body>',tag+'</body>',1)
                  p.write_text(text,encoding='utf-8')

          app=Path('js/app.js')
          text=app.read_text(encoding='utf-8')
          marker='  </body></html>`;'
          if 'global-navigation.js' not in text and marker in text:
              text=text.replace(marker,'  <script src="js/global-navigation.js"></script></body></html>`;',1)
              app.write_text(text,encoding='utf-8')
          PY

      - name: Commit navigation changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html project.html project-edit.html project-report.html js/app.js
          if git diff --cached --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git commit -m "Add main page and fan selection shortcuts"
          git pull --rebase origin main
          git push origin main
