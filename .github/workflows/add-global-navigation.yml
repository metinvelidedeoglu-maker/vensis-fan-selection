name: Add global navigation

on:
  push:
    paths:
      - '.github/workflows/add-global-navigation.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add navigation shortcuts
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p=Path(path)
              text=p.read_text(encoding='utf-8')
              if new in text:
                  return
              if old not in text:
                  raise RuntimeError(f'Anchor not found in {path}')
              p.write_text(text.replace(old,new,1),encoding='utf-8')

          replace_once(
              'project.html',
              '<button class="secondary" onclick="location.href=\'index.html\'">← Fan Selection</button>',
              '<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="secondary" onclick="location.href=\'index.html\'">⌂ Home</button><button class="secondary" onclick="goActiveSelection()">Fan Selection</button></div>'
          )
          replace_once(
              'project.html',
              'function openProject(id){',
              "function goActiveSelection(){location.href='index.html'}function openProject(id){"
          )

          replace_once(
              'project-edit.html',
              '<div class="top-actions"><button class="primary" onclick="location.href=\'project-report.html\'">PDF / Print</button><button class="secondary" onclick="location.href=\'project.html\'">← Projects</button></div>',
              '<div class="top-actions"><button class="primary" onclick="location.href=\'index.html\'">+ Add Fans</button><button class="primary" onclick="location.href=\'project-report.html\'">PDF / Print</button><button class="secondary" onclick="location.href=\'project.html\'">Projects</button><button class="secondary" onclick="location.href=\'index.html\'">⌂ Home</button></div>'
          )

          replace_once(
              'project-report.html',
              '<div class="toolbar"><button class="secondary" onclick="history.back()">← Back</button><button class="primary" onclick="window.print()">Create PDF / Print</button></div>',
              '<div class="toolbar"><button class="secondary" onclick="location.href=\'index.html\'">⌂ Home</button><button class="secondary" onclick="location.href=\'project-edit.html\'">Project</button><button class="secondary" onclick="location.href=\'index.html\'">+ Add Fans</button><button class="primary" onclick="window.print()">Create PDF / Print</button></div>'
          )

          app=Path('js/app.js')
          text=app.read_text(encoding='utf-8')
          old='<button class="secondary" onclick="window.close()">✕ Close Tab</button>'
          new='<button class="secondary" onclick="location.href=\'index.html\'">⌂ Home</button><button class="secondary" onclick="window.close()">✕ Close Tab</button>'
          if new not in text:
              if old not in text:
                  raise RuntimeError('Detail navigation anchor not found')
              app.write_text(text.replace(old,new,1),encoding='utf-8')
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add project.html project-edit.html project-report.html js/app.js
          git commit -m "Add global home and project fan selection navigation"
          git push
