<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VENSIS Quotation Report</title><style>:root{--g:#006b3c;--d:#173f46;--l:#dfe7e2;--s:#f4f7f5;--t:#17342b}*{box-sizing:border-box}body{margin:0;font-family:Arial;background:var(--s);color:var(--t)}.toolbar{max-width:1050px;margin:14px auto;padding:0 14px;display:flex;justify-content:flex-end;gap:8px}.toolbar button{border:0;border-radius:8px;padding:10px 14px;font-weight:700;cursor:pointer}.primary{background:var(--g);color:#fff}.secondary{background:#fff;color:var(--d);border:1px solid var(--d)}.sheet{max-width:1050px;margin:0 auto 24px;background:#fff;border:1px solid var(--l);padding:28px}.header{display:flex;justify-content:space-between;border-bottom:4px solid var(--g);padding-bottom:14px}.logo{height:58px}.title{text-align:right}.meta{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:18px 0}.field{border:1px solid var(--l);padding:10px;border-radius:7px}.field span{display:block;font-size:10px;color:#6c7f76}.customer{margin:18px 0;padding:14px;background:#f8fbf9;border-left:4px solid var(--g)}table{width:100%;border-collapse:collapse}th{background:var(--d);color:#fff;padding:9px;text-align:left;font-size:11px}td{padding:8px 9px;font-size:11px;vertical-align:top}.product-name td{border-bottom:0;padding-bottom:3px}.product-title{font-weight:700}.model-code{margin-top:2px;font-size:9px;color:#64766d}.product-details td{border-bottom:0;padding-top:2px;padding-bottom:4px;color:#64766d;font-size:10px}.product-note td{padding-top:3px;padding-bottom:10px;border-bottom:1px solid var(--l);white-space:pre-wrap;font-style:italic}.price-cell{vertical-align:middle!important;border-bottom:1px solid var(--l)!important}.manual-badge{display:inline-block;margin-left:5px;padding:1px 5px;border-radius:8px;background:#edf4ef;color:var(--g);font-size:8px}.totals{margin-left:auto;margin-top:16px;width:330px}.totals div{display:flex;justify-content:space-between;padding:7px 0}.grand{border-top:2px solid var(--g);font-size:17px;color:var(--g)}.notes{margin-top:22px;border:1px solid var(--l);padding:12px;white-space:pre-wrap}.footer{margin-top:30px;border-top:1px solid var(--l);padding-top:9px;font-size:10px;color:#79877f;display:flex;justify-content:space-between}@media print{body{background:#fff}.toolbar{display:none}.sheet{max-width:none;margin:0;border:0;padding:0}@page{size:A4;margin:12mm}}</style></head><body><div class="toolbar"><button class="secondary" onclick="location.href='quotation-edit.html'">Edit Quotation</button><button class="secondary" onclick="location.href='project-edit.html'">Project Selection</button><button class="primary" onclick="window.print()">Create PDF / Print</button></div><main class="sheet"><div class="header"><img class="logo" src="assets/vensis-logo.png"><div class="title"><h1 style="margin:0">QUOTATION</h1><div id="qNo"></div></div></div><div class="meta"><div class="field"><span>Date</span><b id="qDate"></b></div><div class="field"><span>Validity</span><b id="qValidity"></b></div><div class="field"><span>Currency</span><b id="qCurrency"></b></div><div class="field"><span>Project No.</span><b id="pNo"></b></div></div><div class="customer"><b id="company"></b><div id="contact"></div><div id="email"></div></div><table><thead><tr><th>No.</th><th>Product</th><th>Qty</th><th>List Unit</th><th>Discount</th><th>Net Unit</th><th>Total</th></tr></thead><tbody id="rows"></tbody></table><div class="totals"><div class="grand"><span>Grand Total</span><b id="grand"></b></div></div><div class="notes" id="notes"></div><div class="footer"><span>VENSIS Engineering Suite</span><span id="footerNo"></span></div></main><script src="js/catalog-series.js?v=20260717-direct1"></script><script>const PROJECTS='vensis_projects_v2',ACTIVE='vensis_active_project_v2';function load(){try{return JSON.parse(localStorage.getItem(PROJECTS)||'[]')}catch(e){return []}}function fmt(v,d=2){return new Intl.NumberFormat('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}).format(Number(v)||0)}function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function productTitle(x){if(x.type==='manual')return x.model||'Manual product';return window.VensisCatalog?.getSeriesName(x.model)||x.productName||x.model||'Product'}function details(x){if(x.type==='manual')return x.unit?'Unit: '+x.unit:'';const parts=[];if(x.flow!=null)parts.push('Flow: '+fmt(x.flow,0)+' m³/h');if(x.pressure!=null)parts.push('Pressure: '+fmt(x.pressure,0)+' Pa');if(x.motorPower!=null)parts.push('Power: '+fmt(x.motorPower,2)+' kW');if(x.speed!=null)parts.push('Speed: '+fmt(x.speed,0)+' rpm');if(x.noise!=null)parts.push('Noise: '+fmt(x.noise,0)+' dB(A)');return parts.join(' · ')}function orderedItems(p){const q=p.quotation||{},manual=Array.isArray(q.manualItems)?q.manualItems:[],selection=p.items||[],valid=[...selection.map(x=>'s:'+x.id),...manual.map(x=>'m:'+x.id)],order=Array.isArray(q.itemOrder)?q.itemOrder.filter(x=>valid.includes(x)):[];valid.forEach(x=>{if(!order.includes(x))order.push(x)});return order.map(ref=>{const id=ref.slice(2),x=ref.startsWith('m:')?manual.find(v=>v.id===id):selection.find(v=>String(v.id)===id);return x?{ref,x}:null}).filter(Boolean)}function init(){const id=localStorage.getItem(ACTIVE),p=load().find(x=>x.id===id);if(!p){document.body.innerHTML='<div style="padding:40px">No active project.</div>';return}const m=p.meta||{},q=p.quotation||{},cur=q.currency||'EUR';qNo.textContent=q.quotationNo||'';qDate.textContent=q.date||'';qValidity.textContent=(q.validityDays||30)+' days';qCurrency.textContent=cur;pNo.textContent=m.projectNo||'';company.textContent=m.companyName||m.customer||'';contact.textContent=m.contactPerson||'';email.textContent=m.email||'';footerNo.textContent=q.quotationNo||'';notes.textContent=q.notes||'Prices exclude VAT unless otherwise stated.';let total=0;rows.innerHTML=orderedItems(p).map(({ref,x},i)=>{const manual=ref.startsWith('m:'),list=Number(x.quotationUnitPrice??x.unitPrice)||0,disc=Math.min(100,Math.max(0,Number(x.discount)||0)),qty=Number(x.quantity)||1,net=list*(1-disc/100),line=net*qty,note=String(x.manualNote||'').trim(),detail=details(x),span=1+(detail?1:0)+(note?1:0);total+=line;const image=!manual&&window.VensisCatalog?.getImage(x.model)?`<img class="catalog-product-image" src="${window.VensisCatalog.getImage(x.model)}" alt="${esc(productTitle(x))}" style="width:66px;height:66px;object-fit:contain;float:left;margin:0 11px 5px 0;border:1px solid #e2e9e5;border-radius:7px;background:#fff;padding:4px">`:'';const product=manual?`<b>${esc(x.model||'')}</b><span class="manual-badge">MANUAL</span>`:`${image}<div class="product-title">${esc(productTitle(x))}</div><div class="model-code">Model: ${esc(x.model||'')}</div>`;return `<tr class="product-name"><td class="price-cell" rowspan="${span}">${i+1}</td><td>${product}</td><td class="price-cell" rowspan="${span}">${qty}</td><td class="price-cell" rowspan="${span}">${fmt(list)} ${cur}</td><td class="price-cell" rowspan="${span}">${fmt(disc)}%</td><td class="price-cell" rowspan="${span}">${fmt(net)} ${cur}</td><td class="price-cell" rowspan="${span}"><b>${fmt(line)} ${cur}</b></td></tr>${detail?`<tr class="product-details"><td>${esc(detail)}</td></tr>`:''}${note?`<tr class="product-note"><td>${esc(note)}</td></tr>`:''}`}).join('');grand.textContent=fmt(total)+' '+cur;window.VensisCatalog?.apply(document)}init();</script><script src="js/auth.js?v=20260714-auth1"></script></body></html>
