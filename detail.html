<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Product Details</title>
<style>html,body{margin:0;background:#eef3f4}</style>
</head>
<body>
<script>
(function(){
  try{
    const key=new URLSearchParams(location.search).get('key');
    if(!key)throw new Error('No product key received.');
    const payload=localStorage.getItem(key);
    if(!payload)throw new Error('Product detail data was not found.');
    localStorage.removeItem(key);

    document.body.innerHTML='';
    document.open('text/html','replace');
    document.write(payload);
    document.close();
  }catch(error){
    document.body.innerHTML='<div style="padding:30px;font-family:Arial"><h2>Product details could not be opened.</h2><p>'+String(error.message||error)+'</p><p><button onclick="window.close()" style="padding:10px 14px">Close</button></p></div>';
  }
})();
</script>
</body>
</html>
