<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VENSIS Projects</title><style>:root{--g:#006b3c;--d:#173f46;--l:#dfe7e2;--s:#f4f7f5;--t:#17342b}*{box-sizing:border-box}body{margin:0;font-family:Arial;background:var(--s);color:var(--t)}.top{padding:14px 20px;background:linear-gradient(135deg,#004f2d,#006b3c);color:#fff;display:flex;justify-content:space-between;gap:12px;align-items:center}.top h1{margin:0;font-size:22px}.wrap{max-width:1200px;margin:18px auto;padding:0 14px}.toolbar{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:14px}.toolbar h2{margin:0}button{border:0;border-radius:8px;padding:10px 13px;font-weight:700;cursor:pointer}.primary{background:var(--g);color:#fff}.secondary{background:#fff;color:var(--d);border:1px solid var(--d)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.card{background:#fff;border:1px solid var(--l);border-radius:12px;padding:16px;box-shadow:0 3px 12px rgba(10,62,38,.06)}.card.active{border:2px solid var(--g)}.no{font-size:13px;color:var(--g);font-weight:800}.name{font-size:18px;font-weight:800;margin:8px 0 3px}.customer{color:#5f736a;font-size:13px;min-height:18px}.meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}.meta div{background:#f5f8f6;border-radius:7px;padding:9px}.meta span{display:block;color:#78877f;font-size:10px;margin-bottom:3px}.status{display:inline-flex;padding:5px 9px;border-radius:999px;background:#eaf5ef;color:var(--g);font-size:11px;font-weight:800}.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:14px}.actions button{padding:8px;font-size:12px}.danger{color:#a52218;border-color:#e5b8b4}.empty{text-align:center;padding:60px 15px;background:#fff;border:1px dashed #bccbc3;border-radius:12px;color:#718078}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}}@media(max-width:620px){.grid{grid-template-columns:1fr}.top,.toolbar{align-items:stretch;flex-direction:column}.top button,.toolbar button{width:100%}}</style><link rel="stylesheet" href="css/form-state.css"></head><body><div class="top"><div><h1>VENSIS Projects</h1><small>Manage selection projects</small></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="secondary" onclick="location.href='index.html'">⌂ Home</button><button class="secondary" onclick="goActiveSelection()">Fan Selection</button></div></div><div class="wrap"><div class="toolbar"><h2>Project Dashboard</h2><button class="primary" onclick="newProject()">+ New Project</button></div><div id="projects" class="grid"></div></div><script>const PROJECTS='vensis_projects_v2',ACTIVE='vensis_active_project_v2',ITEMS='vensis_selection_project_v1',META='vensis_selection_project_meta_v1';function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]))}function today(){const d=new Date();return [d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-')}function noFor(date,arr){const p='PRJ-'+date.replaceAll('-','')+'-';return p+String(arr.filter(x=>x.meta?.projectNo?.startsWith(p)).length+1).padStart(3,'0')}function load(){try{return JSON.parse(localStorage.getItem(PROJECTS)||'[]')}catch(e){return []}}function save(x){localStorage.setItem(PROJECTS,JSON.stringify(x))}function migrate(){let arr=load();if(arr.length)return;let items=[],meta={};try{items=JSON.parse(localStorage.getItem(ITEMS)||'[]');meta=JSON.parse(localStorage.getItem(META)||'{}')}catch(e){}if(items.length||Object.keys(meta).length){const d=meta.date||today();const p={id:'prj_'+Date.now(),meta:{name:meta.name||'',customer:meta.customer||'',date:d,projectNo:meta.projectNo||noFor(d,arr),status:meta.status||'Draft',notes:meta.notes||''},items,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};arr=[p];save(arr);localStorage.setItem(ACTIVE,p.id)}}function newProject(){const arr=load(),d=today(),p={id:'prj_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),meta:{name:'',customer:'',date:d,projectNo:noFor(d,arr),status:'Draft',notes:''},items:[],createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};arr.unshift(p);save(arr);openProject(p.id)}function goActiveSelection(){location.href='index.html'}function openProject(id){const p=load().find(x=>x.id===id);if(!p)return;localStorage.setItem(ACTIVE,id);localStorage.setItem(ITEMS,JSON.stringify(p.items||[]));localStorage.setItem(META,JSON.stringify(p.meta||{}));location.href='project-edit.html'}function duplicateProject(id){const arr=load(),p=arr.find(x=>x.id===id);if(!p)return;const d=today(),copy=JSON.parse(JSON.stringify(p));copy.id='prj_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);copy.meta.projectNo=noFor(d,arr);copy.meta.date=d;copy.meta.name=(copy.meta.name||'Unnamed Project')+' Copy';copy.createdAt=copy.updatedAt=new Date().toISOString();arr.unshift(copy);save(arr);render()}function deleteProject(id){if(!confirm('Delete this project?'))return;const arr=load().filter(x=>x.id!==id);save(arr);if(localStorage.getItem(ACTIVE)===id)localStorage.removeItem(ACTIVE);render()}function render(){const arr=load(),active=localStorage.getItem(ACTIVE),box=document.getElementById('projects');if(!arr.length){box.className='';box.innerHTML='<div class="empty">No projects yet.<br><br><button class="primary" onclick="newProject()">Create First Project</button></div>';return}box.className='grid';box.innerHTML=arr.map(p=>`<div class="card ${p.id===active?'active':''}"><div class="no">📁 ${esc(p.meta?.projectNo||'-')}</div><div class="name">${esc(p.meta?.name||'Unnamed Project')}</div><div class="customer">${esc(p.meta?.customer||'No customer')}</div><div class="meta"><div><span>Date</span><b>${esc(p.meta?.date||'-')}</b></div><div><span>Products</span><b>${(p.items||[]).reduce((s,x)=>s+(+x.quantity||1),0)}</b></div></div><span class="status">${esc(p.meta?.status||'Draft')}</span><div class="actions"><button class="primary" onclick="openProject('${p.id}')">Open</button><button class="secondary" onclick="duplicateProject('${p.id}')">Duplicate</button><button class="secondary danger" onclick="deleteProject('${p.id}')">Delete</button></div></div>`).join('')}migrate();render();</script><script src="js/global-navigation.js"></script><script src="js/form-state.js"></script><script src="js/auth.js?v=20260714-auth1"></script></body></html>
