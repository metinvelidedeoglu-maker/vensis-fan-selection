<style id="catalog-mobile-stack-fix">
body.app-catalog .check-row{
  display:flex!important;
  align-items:center!important;
  justify-content:flex-start!important;
  gap:10px!important;
  min-height:44px!important;
  margin:0!important;
  padding:10px 12px!important;
  cursor:pointer;
}
body.app-catalog .check-row+ .check-row{border-top:1px solid #e5ece9}
body.app-catalog .check-row input[type="checkbox"]{
  width:20px!important;
  height:20px!important;
  min-width:20px!important;
  max-width:20px!important;
  flex:0 0 20px!important;
  margin:0!important;
  padding:0!important;
  border-radius:4px!important;
  box-shadow:none!important;
  accent-color:#087f4f;
}
body.app-catalog .check-row span{display:block;min-width:0;flex:1;line-height:1.25}
@media(max-width:1000px){
  body.app-catalog .catalog-layout{display:grid!important;grid-template-columns:minmax(0,1fr)!important;grid-template-rows:auto auto!important;width:100%!important;}
  body.app-catalog .catalog-filter{grid-column:1!important;grid-row:1!important;position:static!important;top:auto!important;width:100%!important;min-width:0!important;}
  body.app-catalog .catalog-content{grid-column:1!important;grid-row:2!important;width:100%!important;min-width:0!important;}
}
@media(max-width:620px){
  body.app-catalog .catalog-layout{padding:10px!important;gap:12px!important;}
  body.app-catalog .catalog-filter,body.app-catalog .catalog-content{width:100%!important;max-width:100%!important;}
  body.app-catalog .catalog-filter{padding:16px!important;}
  body.app-catalog .filter-group{margin-bottom:16px!important;}
  body.app-catalog .check-list{max-height:none!important;overflow:visible!important;padding:4px!important;}
  body.app-catalog .check-row{min-height:42px!important;padding:9px 10px!important;}
}
