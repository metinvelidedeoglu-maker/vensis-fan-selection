<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vensis Product Catalog</title>
<link rel="stylesheet" href="css/app.css?v=20260719-catalog2">
<style>
body{background:#eef3f4;color:#173033}.catalog-top{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 24px;background:#fff;border-bottom:1px solid #d7e1e3;position:sticky;top:0;z-index:10}.catalog-brand{display:flex;align-items:center;gap:12px}.catalog-brand img{height:44px;max-width:220px;object-fit:contain}.catalog-nav{display:flex;gap:8px}.catalog-nav a{display:inline-flex;align-items:center;gap:7px;padding:10px 13px;border-radius:8px;text-decoration:none;font-weight:700;color:#29484d;background:#e8eff0}.catalog-nav a.active{background:#087f4f;color:#fff}.catalog-layout{display:grid;grid-template-columns:300px minmax(0,1fr);gap:18px;padding:18px}.catalog-filter,.catalog-content,.detail-page{background:#fff;border:1px solid #d8e3e5;border-radius:12px}.catalog-filter{padding:16px;height:max-content;position:sticky;top:90px}.catalog-filter h2,.catalog-content h1{margin:0 0 14px}.filter-group{margin-bottom:16px}.filter-group label{display:block;font-size:12px;font-weight:700;margin-bottom:6px;color:#52666b}.filter-group input{width:100%;padding:10px;border:1px solid #cbd8db;border-radius:8px}.check-list{max-height:210px;overflow:auto;border:1px solid #d8e3e5;border-radius:8px;padding:7px}.check-row{display:flex;align-items:center;gap:8px;padding:6px 4px;font-size:13px}.filter-actions{display:flex;gap:8px}.filter-actions button{flex:1;border:0;border-radius:8px;padding:10px;font-weight:700;cursor:pointer}.filter-actions .reset{background:#e8eff0;color:#29484d}.catalog-content{padding:18px}.catalog-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.catalog-count{color:#64748b;font-size:13px}.catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:14px}.product-card{border:1px solid #d8e3e5;border-radius:12px;background:#fff;overflow:hidden;cursor:pointer;transition:.15s transform,.15s box-shadow}.product-card:hover,.product-card:focus{transform:translateY(-2px);box-shadow:0 8px 24px rgba(23,48,51,.10);outline:2px solid #087f4f;outline-offset:2px}.product-card img{width:100%;height:180px;object-fit:contain;background:#f8fbfb;padding:14px}.product-card-body{padding:14px}.product-card h3{margin:0 0 5px;font-size:16px}.product-card .series{font-size:13px;color:#52666b;min-height:34px}.product-meta{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px;font-size:12px}.product-meta div{background:#f4f8f8;border-radius:7px;padding:7px}.product-meta span{display:block;color:#64748b;font-size:10px}.detail-page{width:min(1100px,calc(100% - 36px));margin:18px auto;padding:22px}.detail-back{display:inline-flex;align-items:center;gap:7px;margin-bottom:18px;padding:10px 13px;border-radius:8px;background:#e8eff0;color:#29484d;text-decoration:none;font-weight:700}.detail-hero{display:grid;grid-template-columns:300px 1fr;gap:22px;align-items:center}.detail-hero img{width:100%;height:240px;object-fit:contain;border:1px solid #d8e3e5;border-radius:10px;padding:14px}.detail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}.detail-field{border:1px solid #d8e3e5;background:#f7fafb;border-radius:7px;padding:9px}.detail-field span{display:block;font-size:11px;color:#64748b}.detail-section{margin-top:18px}.detail-section h3{border-bottom:3px solid #087f4f;padding-bottom:7px}.detail-section ul{padding-left:20px}.siblings{display:flex;flex-wrap:wrap;gap:8px}.siblings a{border:1px solid #cbd8db;background:#fff;color:#173033;text-decoration:none;border-radius:8px;padding:8px 10px}.siblings a.active{background:#087f4f;color:#fff;border-color:#087f4f}.not-found{text-align:center;padding:60px 20px}@media(max-width:850px){.catalog-layout{grid-template-columns:1fr}.catalog-filter{position:static}.detail-hero{grid-template-columns:1fr}.detail-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header class="catalog-top"><div class="catalog-brand"><img src="assets/vensis-logo.png" alt="Vensis"><div><b>Vensis Engineering Suite</b><div style="font-size:12px;color:#64748b">Product Catalog</div></div></div><nav class="catalog-nav"><a href="index.html">⌕ Fan Selection</a><a class="active" href="catalog.html">▦ Product Catalog</a></nav></header>
<div id="catalogLayout" class="catalog-layout">
<aside class="catalog-filter"><h2>Filters</h2><div class="filter-group"><label>Search</label><input id="catalogSearch" type="search" placeholder="Model or series..." oninput="Catalog.render()"></div><div class="filter-group"><label>Manufacturer</label><div id="catalogManufacturers" class="check-list"></div></div><div class="filter-group"><label>Category</label><div id="catalogCategories" class="check-list"></div></div><div class="filter-group"><label>Series</label><div id="catalogSeries" class="check-list"></div></div><div class="filter-actions"><button class="reset" onclick="Catalog.reset()">Reset</button></div></aside>
<main class="catalog-content"><div class="catalog-head"><h1>Products</h1><div id="catalogCount" class="catalog-count"></div></div><div id="catalogGrid" class="catalog-grid"></div></main>
</div>
<main id="detailPage" class="detail-page" hidden></main>
