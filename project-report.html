<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VENSIS Project Report</title><style>:root{--g:#006b3c;--d:#173f46;--l:#dfe7e2;--s:#f4f7f5;--t:#17342b}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--s);color:var(--t)}.toolbar{max-width:1100px;margin:14px auto;padding:0 14px;display:flex;justify-content:flex-end;gap:8px}.toolbar button{border:0;border-radius:8px;padding:10px 14px;font-weight:700;cursor:pointer}.primary{background:var(--g);color:#fff}.secondary{background:#fff;color:var(--d);border:1px solid var(--d)}.sheet{max-width:1100px;margin:0 auto 24px;background:#fff;border:1px solid var(--l);box-shadow:0 4px 16px rgba(0,0,0,.07);padding:28px}.header{display:flex;justify-content:space-between;align-items:center;border-bottom:4px solid var(--g);padding-bottom:14px}.logo{height:58px;max-width:300px;object-fit:contain}.report-title{text-align:right}.report-title h1{font-size:22px;margin:0 0 4px}.muted{color:#687b72;font-size:12px}.project-title{font-size:25px;margin:22px 0 5px}.meta{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:16px}.field{border:1px solid var(--l);background:#f8fbf9;border-radius:7px;padding:10px}.field span{display:block;color:#6c7f76;font-size:10px;margin-bottom:4px}.section{margin-top:20px;break-inside:avoid}.section-title{background:var(--g);color:#fff;padding:9px 12px;font-weight:700;border-radius:7px 7px 0 0}.notes{border:1px solid var(--l);padding:12px;min-height:55px;white-space:pre-wrap}.table-wrap{overflow:hidden;border:1px solid var(--l)}table{width:100%;border-collapse:collapse}th{background:var(--d);color:#fff;padding:9px;text-align:left;font-size:11px}td{padding:9px;border-bottom:1px solid var(--l);font-size:11px;vertical-align:top}tbody tr:nth-child(even){background:#f8fbf9}.summary{display:flex;justify-content:flex-end;gap:22px;margin-top:12px;font-size:12px}.summary b{font-size:15px;color:var(--g)}.footer{margin-top:28px;padding-top:9px;border-top:1px solid var(--l);display:flex;justify-content:space-between;color:#7a8982;font-size:10px}@media(max-width:700px){.sheet{padding:16px}.header{align-items:flex-start}.logo{height:42px;max-width:190px}.meta{grid-template-columns:1fr 1fr}.table-wrap{overflow:auto}table{min-width:760px}}@media print{body{background:#fff}.toolbar{display:none}.sheet{max-width:none;margin:0;border:0;box-shadow:none;padding:0}.section{break-inside:avoid}.table-wrap{overflow:visible}table{min-width:0}@page{size:A4;margin:12mm}}</style></head><body><div class="toolbar"><button class="secondary" onclick="history.back()">← Back</button><button class="primary" onclick="window.print()">Create PDF / Print</button></div><main class="sheet"><div class="header"><img class="logo" src="assets/vensis-logo.png" alt="VENSIS"><div class="report-title"><h1>PROJECT SELECTION REPORT</h1><div id="reportDate" class="muted"></div></div></div><h2 id="projectName" class="project-title">Unnamed Project</h2><div id="customer" class="muted"></div><div class="meta"><div class="field"><span>Project No.</span><b id="projectNo">-</b></div><div class="field"><span>Date</span><b id="date">-</b></div><div class="field"><span>Status</span><b id="status">-</b></div><div class="field"><span>Total Quantity</span><b id="totalQty">0</b></div></div><section class="section"><div class="section-title">Project Notes</div><div id="notes" class="notes">-</div></section><section class="section"><div class="section-title">Selected Products</div><div class="table-wrap"><table><thead><tr><th>No.</th><th>Model</th><th>Flow</th><th>Pressure</th><th>Motor Power</th><th>Noise</th><th>Qty</th><th>Unit Price</th></tr></thead><tbody id="rows"></tbody></table></div><div class="summary"><span>Total products: <b id="productCount">0</b></span><span>Catalogue total: <b id="totalPrice">0.00 €</b></span></div></section><div class="footer"><span>VENSIS Engineering Suite</span><span id="footerNo"></span></div></main><script>const PROJECTS='vensis_projects_v2',ACTIVE='vensis_active_project_v2';function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]))}function fmt(v,d=0){const n=Number(v);if(!Number.isFinite(n))return '-';return new Intl.NumberFormat('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n)}function load(){try{return JSON.parse(localStorage.getItem(PROJECTS)||'[]')}catch(e){return []}}function init(){const id=localStorage.getItem(ACTIVE),p=load().find(x=>x.id===id);if(!p){document.body.innerHTML='<div style="padding:40px;font-family:Arial">No active project found.</div>';return}const m=p.meta||{},items=p.items||[];projectName.textContent=m.name||'Unnamed Project';customer.textContent=m.customer||'No customer';projectNo.textContent=m.projectNo||'-';date.textContent=m.date||'-';status.textContent=m.status||'Draft';notes.textContent=m.notes||'-';footerNo.textContent=m.projectNo||'';reportDate.textContent=new Date().toLocaleDateString('en-GB');const qty=items.reduce((s,x)=>s+(Number(x.quantity)||1),0);const total=items.reduce((s,x)=>s+(Number(x.unitPrice)||0)*(Number(x.quantity)||1),0);totalQty.textContent=qty;productCount.textContent=items.length;totalPrice.textContent=fmt(total,2)+' €';rows.innerHTML=items.length?items.map((x,i)=>`<tr><td>${i+1}</td><td><b>${esc(x.model)}</b></td><td>${fmt(x.flow)} m³/h</td><td>${fmt(x.pressure)} Pa</td><td>${fmt(x.motorPower,2)} kW</td><td>${fmt(x.noise)} dB(A)</td><td>${fmt(x.quantity||1)}</td><td>${x.unitPrice==null?'-':fmt(x.unitPrice,2)+' €'}</td></tr>`).join(''):'<tr><td colspan="8" style="text-align:center;padding:30px">No selected products.</td></tr>'}init();</script></body></html>
