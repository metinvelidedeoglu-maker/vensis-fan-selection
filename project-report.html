<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VENSIS Project Report</title><style>:root{--g:#006b3c;--d:#173f46;--l:#dfe7e2;--s:#f4f7f5;--t:#17342b}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--s);color:var(--t)}.toolbar{max-width:1100px;margin:14px auto;padding:0 14px;display:flex;justify-content:flex-end;gap:8px}.toolbar button{border:0;border-radius:8px;padding:10px 14px;font-weight:700;cursor:pointer}.primary{background:var(--g);color:#fff}.secondary{background:#fff;color:var(--d);border:1px solid var(--d)}.sheet{max-width:1100px;margin:0 auto 24px;background:#fff;border:1px solid var(--l);box-shadow:0 4px 16px rgba(0,0,0,.07);padding:28px}.header{display:flex;justify-content:space-between;align-items:center;border-bottom:4px solid var(--g);padding-bottom:14px}.logo{height:58px;max-width:300px;object-fit:contain}.report-title{text-align:right}.report-title h1{font-size:22px;margin:0 0 4px}.muted{color:#687b72;font-size:12px}.project-title{font-size:25px;margin:22px 0 5px}.meta,.product-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:16px}.field{border:1px solid var(--l);background:#f8fbf9;border-radius:7px;padding:10px}.field span{display:block;color:#6c7f76;font-size:10px;margin-bottom:4px}.section{margin-top:20px;break-inside:avoid}.section-title{background:var(--g);color:#fff;padding:9px 12px;font-weight:700;border-radius:7px 7px 0 0}.notes{border:1px solid var(--l);padding:12px;min-height:55px;white-space:pre-wrap}.table-wrap{overflow:hidden;border:1px solid var(--l)}table{width:100%;border-collapse:collapse}th{background:var(--d);color:#fff;padding:9px;text-align:left;font-size:11px}td{padding:9px;border-bottom:1px solid var(--l);font-size:11px;vertical-align:top}tbody tr:nth-child(even){background:#f8fbf9}.summary{display:flex;justify-content:flex-end;gap:22px;margin-top:12px;font-size:12px}.summary b{font-size:15px;color:var(--g)}.product-page{page-break-before:always;margin-top:28px;padding-top:18px;border-top:3px solid var(--g)}.product-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.product-head h2{margin:4px 0}.curve{border:1px solid var(--l);padding:8px;margin-top:12px}.catalogue{border:1px solid var(--l);padding:12px;margin-top:12px}.catalogue h4{margin:10px 0 5px}.catalogue ul{margin:5px 0;padding-left:20px;line-height:1.45}.footer{margin-top:28px;padding-top:9px;border-top:1px solid var(--l);display:flex;justify-content:space-between;color:#7a8982;font-size:10px}@media(max-width:700px){.sheet{padding:16px}.header{align-items:flex-start}.logo{height:42px;max-width:190px}.meta,.product-grid{grid-template-columns:1fr 1fr}.table-wrap{overflow:auto}table{min-width:760px}}@media print{body{background:#fff}.toolbar{display:none}.sheet{max-width:none;margin:0;border:0;box-shadow:none;padding:0}.section{break-inside:avoid}.table-wrap{overflow:visible}table{min-width:0}.product-page{page-break-before:always}@page{size:A4;margin:12mm}}</style><link rel="stylesheet" href="css/form-state.css"></head><body><div class="toolbar"><button class="secondary" onclick="location.href='index.html'">⌂ Home</button><button class="secondary" onclick="location.href='project-edit.html'">Project</button><button class="secondary" onclick="location.href='index.html'">+ Add Fans</button><button class="primary" onclick="window.print()">Create PDF / Print</button></div><main class="sheet"><div class="header"><img class="logo" src="assets/vensis-logo.png" alt="VENSIS"><div class="report-title"><h1>PROJECT SELECTION REPORT</h1><div id="reportDate" class="muted"></div></div></div><h2 id="projectName" class="project-title">Unnamed Project</h2><div id="customer" class="muted"></div><div class="meta"><div class="field"><span>Project No.</span><b id="projectNo">-</b></div><div class="field"><span>Date</span><b id="date">-</b></div><div class="field"><span>Status</span><b id="status">-</b></div><div class="field"><span>Total Quantity</span><b id="totalQty">0</b></div></div><section class="section"><div class="section-title">Project Notes</div><div id="notes" class="notes">-</div></section><section class="section"><div class="section-title">Selected Products</div><div class="table-wrap"><table><thead><tr><th>No.</th><th>Model</th><th>Flow</th><th>Pressure</th><th>Motor Power</th><th>Noise</th><th>Qty</th></tr></thead><tbody id="rows"></tbody></table></div><div class="summary"><span>Total products: <b id="productCount">0</b></span></div></section><div id="productPages"></div><div class="footer"><span>VENSIS Engineering Suite</span><span id="footerNo"></span></div></main><script>window.models=[];</script><script src="data/fans-01.js"></script><script src="data/fans-02.js"></script><script src="data/fans-03.js"></script><script src="data/fans-04.js"></script><script src="data/fans-05.js"></script><script src="data/fans-06.js"></script><script src="data/fans-07.js"></script><script>const PROJECTS='vensis_projects_v2',ACTIVE='vensis_active_project_v2';function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]))}function fmt(v,d=0){const n=Number(v);if(!Number.isFinite(n))return '-';return new Intl.NumberFormat('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n)}function load(){try{return JSON.parse(localStorage.getItem(PROJECTS)||'[]')}catch(e){return []}}function bullets(items){return items&&items.length?`<ul>${items.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`:'<div class="muted">No catalogue text available.</div>'}function curveSvg(item,m){const pts=(m?.points||[]).slice().sort((a,b)=>a[0]-b[0]);if(!pts.length)return '<div class="muted">No performance curve data available.</div>';const W=720,H=310,L=58,R=18,T=20,B=42,maxQ=Math.max(...pts.map(x=>x[1]))*1.08,maxP=Math.max(...pts.map(x=>x[0]))*1.08,x=q=>L+(q/maxQ)*(W-L-R),y=p=>T+(H-T-B)-(p/maxP)*(H-T-B),poly=pts.map(p=>`${x(p[1])},${y(p[0])}`).join(' ');return `<svg viewBox="0 0 ${W} ${H}" width="100%"><polyline fill="none" stroke="#173f46" stroke-width="3" points="${poly}"/><circle cx="${x(item.flow)}" cy="${y(item.pressure)}" r="6" fill="#e49a27"/><text x="${x(item.flow)+9}" y="${y(item.pressure)-8}" font-size="12">${fmt(item.flow)} m³/h @ ${fmt(item.pressure)} Pa</text><text x="${W/2-35}" y="${H-8}" font-size="12">Airflow</text><text x="12" y="${H/2}" font-size="12" transform="rotate(-90 12 ${H/2})">Pressure</text></svg>`}function findModel(item){return (window.models||[]).find(m=>m.key===item.key)||null}function renderProductPages(items){productPages.innerHTML=items.map((x,i)=>{const m=findModel(x)||{},ci=m.catalogueInfo||{general:[],motor:[],applications:[]};return `<section class="product-page"><div class="product-head"><div><div class="muted">PRODUCT ${i+1}</div><h2>${esc(x.model)}</h2><div class="muted">${esc(m.catalogNameEn||m.series||'')}</div></div><div style="text-align:right"><b>Qty: ${fmt(x.quantity||1)}</b><div class="muted">${esc((m.tagsEn||[]).join(' · '))}</div></div></div><div class="product-grid"><div class="field"><span>Airflow</span><b>${fmt(x.flow)} m³/h</b></div><div class="field"><span>Static Pressure</span><b>${fmt(x.pressure)} Pa</b></div><div class="field"><span>Motor Power</span><b>${fmt(x.motorPower,2)} kW</b></div><div class="field"><span>Sound Level</span><b>${fmt(x.noise)} dB(A)</b></div><div class="field"><span>Speed</span><b>${fmt(m.rpm)} rpm</b></div><div class="field"><span>Current</span><b>${fmt(m.amps,2)} A</b></div><div class="field"><span>Voltage</span><b>${esc(m.voltage||'-')}</b></div><div class="field"><span>ATEX</span><b>${m.atex?'Yes':'No'}</b></div></div><div class="curve">${curveSvg(x,m)}</div><div class="catalogue"><h4>General Features</h4>${bullets(ci.general)}<h4>Motor</h4>${bullets(ci.motor)}<h4>Areas of Usage</h4>${bullets(ci.applications)}<div class="muted" style="margin-top:8px">Catalogue page: ${esc(m.sourcePage||'-')}</div></div></section>`}).join('')}function init(){const id=localStorage.getItem(ACTIVE),p=load().find(x=>x.id===id);if(!p){document.body.innerHTML='<div style="padding:40px;font-family:Arial">No active project found.</div>';return}const m=p.meta||{},items=p.items||[];projectName.textContent=m.name||'Unnamed Project';customer.textContent=m.customer||'No customer';projectNo.textContent=m.projectNo||'-';date.textContent=m.date||'-';status.textContent=m.status||'Draft';notes.textContent=m.notes||'-';footerNo.textContent=m.projectNo||'';reportDate.textContent=new Date().toLocaleDateString('en-GB');const qty=items.reduce((s,x)=>s+(Number(x.quantity)||1),0),total=items.reduce((s,x)=>s+(Number(x.unitPrice)||0)*(Number(x.quantity)||1),0);totalQty.textContent=qty;productCount.textContent=items.length;rows.innerHTML=items.length?items.map((x,i)=>`<tr><td>${i+1}</td><td><b>${esc(x.model)}</b></td><td>${fmt(x.flow)} m³/h</td><td>${fmt(x.pressure)} Pa</td><td>${fmt(x.motorPower,2)} kW</td><td>${fmt(x.noise)} dB(A)</td><td>${fmt(x.quantity||1)}</td></tr>`).join(''):'<tr><td colspan="7" style="text-align:center;padding:30px">No selected products.</td></tr>';renderProductPages(items)}init();</script><script src="js/global-navigation.js"></script><script src="js/form-state.js"></script><script src="js/auth.js?v=20260714-auth1"></script></body></html>
