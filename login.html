<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VENSIS Giriş</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f7f5;font-family:Arial;color:#17342b}.card{width:min(92vw,390px);background:#fff;border:1px solid #dfe7e2;border-radius:14px;padding:24px;box-shadow:0 8px 30px rgba(10,62,38,.1)}h1{margin:0 0 6px;font-size:23px}.muted{color:#718078;font-size:13px;margin-bottom:20px}label{display:block;font-size:12px;font-weight:700;margin:12px 0 6px}input{width:100%;padding:12px;border:1px solid #cfdcd4;border-radius:8px;font:inherit}button{width:100%;margin-top:16px;padding:12px;border:0;border-radius:8px;background:#006b3c;color:#fff;font-weight:800;cursor:pointer}.back{display:block;text-align:center;margin-top:13px;color:#173f46;text-decoration:none;font-size:13px}.error{min-height:18px;margin-top:10px;color:#b42318;font-size:12px}</style></head><body><form class="card" onsubmit="return login(event)"><h1>Kullanıcı Girişi</h1><div class="muted">Fiyat, proje ve PDF özellikleri için giriş yapın.</div><label>Kullanıcı adı</label><input id="username" autocomplete="username" required><label>Şifre</label><input id="password" type="password" autocomplete="current-password" required><button type="submit">Giriş Yap</button><div id="error" class="error"></div><a class="back" href="index.html">← Fan seçimine dön</a></form><script src="js/auth.js?v=20260714-auth1"></script><script>async function login(e){e.preventDefault();error.textContent='';const ok=await VensisAuth.login(username.value,password.value);if(!ok){error.textContent='Kullanıcı adı veya şifre hatalı.';return false}location.href='index.html';return false}</script></body></html>
