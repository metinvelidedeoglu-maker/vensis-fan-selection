<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VENSIS Quotation</title><style>:root{--g:#006b3c;--d:#173f46;--l:#dfe7e2;--s:#f4f7f5;--t:#17342b}*{box-sizing:border-box}body{margin:0;font-family:Arial;background:var(--s);color:var(--t)}.top{padding:14px 20px;background:linear-gradient(135deg,#173f46,#006b3c);color:#fff;display:flex;justify-content:space-between;gap:12px;align-items:center}.top h1{margin:0;font-size:21px}.top-actions{display:flex;gap:8px;flex-wrap:wrap}button{border:0;border-radius:8px;padding:10px 13px;font-weight:700;cursor:pointer}.primary{background:#fff;color:var(--g)}.secondary{background:#fff;color:var(--d);border:1px solid var(--d)}.wrap{max-width:1250px;margin:18px auto;padding:0 14px}.card{background:#fff;border:1px solid var(--l);border-radius:10px;overflow:hidden;margin-bottom:14px}.head{padding:12px 15px;background:var(--d);color:#fff}.body{padding:14px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.f label{display:block;font-size:12px;font-weight:700;margin-bottom:6px}.f input,.f textarea,.f select{width:100%;padding:10px;border:1px solid #cfdcd4;border-radius:7px;font:inherit}.table{overflow:auto;border:1px solid var(--l);border-radius:7px}table{width:100%;border-collapse:collapse;min-width:1080px}th{background:var(--g);color:#fff;padding:10px;text-align:left;font-size:12px}td{padding:9px;border-bottom:1px solid var(--l);font-size:13px}.num{width:105px;padding:8px}.summary{display:flex;justify-content:flex-end;gap:28px;padding-top:14px}.summary b{font-size:18px;color:var(--g)}@media(max-width:800px){.grid{grid-template-columns:1fr 1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><div class="top"><div><h1>VENSIS Quotation</h1><div style="font-size:12px;opacity:.85">Commercial offer</div></div><div class="top-actions"><button class="primary" onclick="location.href='quotation-report.html'">Preview Quotation</button><button class="secondary" onclick="location.href='project-edit.html'">Project Selection</button><button class="secondary" onclick="goMainPage()">⌂ Home</button></div></div><div class="wrap"><div class="card"><div class="head"><b>Quotation Information</b></div><div class="body"><div class="grid"><div class="f"><label>Quotation No.</label><input id="quotationNo"></div><div class="f"><label>Date</label><input id="quotationDate" type="date"></div><div class="f"><label>Validity (Days)</label><input id="validityDays" type="number" min="1"></div><div class="f"><label>Currency</label><select id="currency"><option>EUR</option><option>USD</option><option>TRY</option></select></div></div><div class="f" style="margin-top:10px"><label>Commercial Notes</label><textarea id="quotationNotes" style="min-height:80px"></textarea></div></div></div><div class="card"><div class="head"><b>Quotation Items</b></div><div class="body"><div id="content"></div></div></div></div><script>const PROJECTS='vensis_projects_v2',ACTIVE='vensis_active_project_v2';function load(){try{return JSON.parse(localStorage.getItem(PROJECTS)||'[]')}catch(e){return []}}function save(a){localStorage.setItem(PROJECTS,JSON.stringify(a))}function cur(){const id=localStorage.getItem(ACTIVE);return load().find(x=>x.id===id)}function fmt(v,d=2){return new Intl.NumberFormat('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}).format(Number(v)||0)}function persist(){const a=load(),id=localStorage.getItem(ACTIVE),i=a.findIndex(x=>x.id===id);if(i<0)return;a[i].quotation={...(a[i].quotation||{}),quotationNo:quotationNo.value.trim(),date:quotationDate.value,validityDays:Number(validityDays.value)||30,currency:currency.value,notes:quotationNotes.value};a[i].updatedAt=new Date().toISOString();save(a)}function updateItem(id,key,value){const a=load(),pid=localStorage.getItem(ACTIVE),i=a.findIndex(x=>x.id===pid);if(i<0)return;const x=a[i].items.find(x=>x.id===id);if(!x)return;x[key]=Math.max(0,Number(value)||0);a[i].updatedAt=new Date().toISOString();save(a);render()}function render(){const p=cur(),items=p?.items||[];if(!items.length){content.innerHTML='<div style="padding:35px;text-align:center">No products.</div>';return}let total=0;content.innerHTML=`<div class="table"><table><thead><tr><th>Model</th><th>Qty</th><th>List Unit</th><th>Discount %</th><th>Net Unit</th><th>Total</th></tr></thead><tbody>${items.map(x=>{const list=Number(x.quotationUnitPrice??x.unitPrice)||0,disc=Math.min(100,Math.max(0,Number(x.discount)||0)),net=list*(1-disc/100),line=net*(Number(x.quantity)||1);total+=line;return `<tr><td><b>${x.model||''}</b><div style="font-size:11px;color:#6c7f76">${fmt(x.flow,0)} m³/h · ${fmt(x.pressure,0)} Pa</div></td><td>${Number(x.quantity)||1}</td><td><input class="num" type="number" step="0.01" value="${list}" onchange="updateItem('${x.id}','quotationUnitPrice',this.value)"></td><td><input class="num" type="number" min="0" max="100" step="0.01" value="${disc}" onchange="updateItem('${x.id}','discount',this.value)"></td><td>${fmt(net)} ${p.quotation?.currency||'EUR'}</td><td><b>${fmt(line)} ${p.quotation?.currency||'EUR'}</b></td></tr>`}).join('')}</tbody></table></div><div class="summary"><span>Grand Total: <b>${fmt(total)} ${p.quotation?.currency||'EUR'}</b></span></div>`}function init(){const p=cur();if(!p){location.href='project.html';return}const q=p.quotation||{};quotationNo.value=q.quotationNo||((p.meta?.projectNo||'PRJ')+'-Q');quotationDate.value=q.date||new Date().toISOString().slice(0,10);validityDays.value=q.validityDays||30;currency.value=q.currency||'EUR';quotationNotes.value=q.notes||'';['quotationNo','quotationDate','validityDays','currency','quotationNotes'].forEach(id=>document.getElementById(id).addEventListener('change',persist));render()}init();</script><script src="js/global-navigation.js"></script><script src="js/auth.js?v=20260714-auth1"></script></body></html>
