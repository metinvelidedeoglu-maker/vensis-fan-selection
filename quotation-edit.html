<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VENSIS Quotation</title><style>:root{--g:#006b3c;--d:#173f46;--l:#dfe7e2;--s:#f4f7f5;--t:#17342b}*{box-sizing:border-box}body{margin:0;font-family:Arial;background:var(--s);color:var(--t)}.top{padding:14px 20px;background:linear-gradient(135deg,#173f46,#006b3c);color:#fff;display:flex;justify-content:space-between;gap:12px;align-items:center}.top h1{margin:0;font-size:21px}.top-actions,.item-actions{display:flex;gap:7px;flex-wrap:wrap}button{border:0;border-radius:8px;padding:10px 13px;font-weight:700;cursor:pointer}.primary{background:#fff;color:var(--g)}.secondary{background:#fff;color:var(--d);border:1px solid var(--d)}.add{background:var(--g);color:#fff}.danger{background:#fff;color:#a52a2a;border:1px solid #d9aaaa}.mini{padding:6px 9px;border-radius:6px}.wrap{max-width:1320px;margin:18px auto;padding:0 14px}.card{background:#fff;border:1px solid var(--l);border-radius:10px;overflow:hidden;margin-bottom:14px}.head{padding:12px 15px;background:var(--d);color:#fff;display:flex;align-items:center;justify-content:space-between;gap:12px}.body{padding:14px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.f label{display:block;font-size:12px;font-weight:700;margin-bottom:6px}.f input,.f textarea,.f select{width:100%;padding:10px;border:1px solid #cfdcd4;border-radius:7px;font:inherit}.table{overflow:auto;border:1px solid var(--l);border-radius:7px}table{width:100%;border-collapse:collapse;min-width:1240px}th{background:var(--g);color:#fff;padding:10px;text-align:left;font-size:12px}td{padding:9px;border-bottom:1px solid var(--l);font-size:13px;vertical-align:top}.num{width:96px;padding:8px}.product-name td{border-bottom:0;padding-bottom:4px}.product-title{font-weight:700}.model-code{margin-top:3px;font-size:11px;color:#60736a}.product-details td{border-bottom:0;padding-top:3px;padding-bottom:5px;color:#60736a;font-size:12px}.product-note td{padding-top:3px;padding-bottom:14px;border-bottom:2px solid var(--l)}.product-note textarea{width:100%;min-height:58px;resize:vertical;padding:9px;border:1px solid #cfdcd4;border-radius:7px;font:inherit}.price-cell{vertical-align:middle!important;border-bottom:2px solid var(--l)!important}.manual-badge{display:inline-block;margin-left:7px;padding:2px 6px;border-radius:9px;background:#edf4ef;color:var(--g);font-size:10px}.summary{display:flex;justify-content:flex-end;gap:28px;padding-top:14px}.summary b{font-size:18px;color:var(--g)}@media(max-width:800px){.grid{grid-template-columns:1fr 1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><div class="top"><div><h1>VENSIS Quotation</h1><div style="font-size:12px;opacity:.85">Commercial offer</div></div><div class="top-actions"><button class="primary" onclick="location.href='quotation-report.html'">Preview Quotation</button><button class="secondary" onclick="location.href='project-edit.html'">Project Selection</button><button class="secondary" onclick="goMainPage()">⌂ Home</button></div></div><div class="wrap"><div class="card"><div class="head"><b>Quotation Information</b></div><div class="body"><div class="grid"><div class="f"><label>Quotation No.</label><input id="quotationNo"></div><div class="f"><label>Date</label><input id="quotationDate" type="date"></div><div class="f"><label>Validity (Days)</label><input id="validityDays" type="number" min="1"></div><div class="f"><label>Currency</label><select id="currency"><option>EUR</option><option>USD</option><option>TRY</option></select></div></div><div class="f" style="margin-top:10px"><label>Commercial Notes</label><textarea id="quotationNotes" style="min-height:80px"></textarea></div></div></div><div class="card"><div class="head"><b>Quotation Items</b><button class="add" onclick="addManualItem()">+ Add Manual Product</button></div><div class="body"><div id="content"></div></div></div></div><script>const PROJECTS='vensis_projects_v2',ACTIVE='vensis_active_project_v2';function load(){try{return JSON.parse(localStorage.getItem(PROJECTS)||'[]')}catch(e){return []}}function save(a){localStorage.setItem(PROJECTS,JSON.stringify(a))}function activeIndex(a){const id=localStorage.getItem(ACTIVE);return a.findIndex(x=>x.id===id)}function cur(){const a=load(),i=activeIndex(a);return i<0?null:a[i]}function fmt(v,d=2){return new Intl.NumberFormat('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}).format(Number(v)||0)}function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function ensureQuotation(p){p.quotation=p.quotation||{};p.quotation.manualItems=Array.isArray(p.quotation.manualItems)?p.quotation.manualItems:[];const valid=[...(p.items||[]).map(x=>'s:'+x.id),...p.quotation.manualItems.map(x=>'m:'+x.id)];let order=Array.isArray(p.quotation.itemOrder)?p.quotation.itemOrder.filter(x=>valid.includes(x)):[];valid.forEach(x=>{if(!order.includes(x))order.push(x)});p.quotation.itemOrder=order;return p.quotation}function persist(){const a=load(),i=activeIndex(a);if(i<0)return;const q=ensureQuotation(a[i]);Object.assign(q,{quotationNo:quotationNo.value.trim(),date:quotationDate.value,validityDays:Number(validityDays.value)||30,currency:currency.value,notes:quotationNotes.value});a[i].updatedAt=new Date().toISOString();save(a)}function findItem(p,ref){const manual=ref.startsWith('m:'),id=ref.slice(2),q=ensureQuotation(p);return manual?q.manualItems.find(x=>x.id===id):(p.items||[]).find(x=>String(x.id)===id)}function updateItem(ref,key,value,text=false){const a=load(),i=activeIndex(a);if(i<0)return;const x=findItem(a[i],ref);if(!x)return;x[key]=text?value:Math.max(0,Number(value)||0);a[i].updatedAt=new Date().toISOString();save(a);if(!text)render()}function addManualItem(){const a=load(),i=activeIndex(a);if(i<0)return;const q=ensureQuotation(a[i]),id='manual-'+Date.now()+'-'+Math.random().toString(36).slice(2,7);q.manualItems.push({id,type:'manual',model:'Manual product',manualNote:'',quantity:1,unit:'pcs',quotationUnitPrice:0,discount:0});q.itemOrder.push('m:'+id);a[i].updatedAt=new Date().toISOString();save(a);render()}function removeManual(ref){if(!confirm('Remove this manual product from the quotation?'))return;const a=load(),i=activeIndex(a);if(i<0)return;const q=ensureQuotation(a[i]),id=ref.slice(2);q.manualItems=q.manualItems.filter(x=>x.id!==id);q.itemOrder=q.itemOrder.filter(x=>x!==ref);a[i].updatedAt=new Date().toISOString();save(a);render()}function moveItem(ref,dir){const a=load(),i=activeIndex(a);if(i<0)return;const q=ensureQuotation(a[i]),n=q.itemOrder.indexOf(ref),m=n+dir;if(n<0||m<0||m>=q.itemOrder.length)return;[q.itemOrder[n],q.itemOrder[m]]=[q.itemOrder[m],q.itemOrder[n]];a[i].updatedAt=new Date().toISOString();save(a);render()}function productTitle(x){if(x.type==='manual')return x.model||'Manual product';if(x.productName)return x.productName;const m=String(x.model||'').toUpperCase();if(m.includes('CRS/ATEX')||m.includes('CRS-ATEX')||(m.includes('CRS')&&m.includes('ATEX')))return 'ATEX Salyangoz Exproof Fan';if(m.includes('ATEX'))return 'ATEX Exproof Fan';if(m.startsWith('CRS'))return 'Salyangoz Fan';return 'Endüstriyel Fan'}function details(x){if(x.type==='manual')return x.unit?'Unit: '+x.unit:'';const parts=[];if(x.flow!=null)parts.push('Flow: '+fmt(x.flow,0)+' m³/h');if(x.pressure!=null)parts.push('Pressure: '+fmt(x.pressure,0)+' Pa');if(x.motorPower!=null)parts.push('Power: '+fmt(x.motorPower,2)+' kW');if(x.speed!=null)parts.push('Speed: '+fmt(x.speed,0)+' rpm');if(x.noise!=null)parts.push('Noise: '+fmt(x.noise,0)+' dB(A)');return parts.join(' · ')}function render(){const p=cur();if(!p){content.innerHTML='No active project.';return}const q=ensureQuotation(p),ordered=q.itemOrder.map(ref=>({ref,x:findItem(p,ref)})).filter(o=>o.x);if(!ordered.length){content.innerHTML='<div style="padding:35px;text-align:center">No products.</div>';return}let total=0;content.innerHTML=`<div class="table"><table><thead><tr><th>Order</th><th>Product</th><th>Qty</th><th>List Unit</th><th>Discount %</th><th>Net Unit</th><th>Total</th></tr></thead><tbody>${ordered.map(({ref,x},idx)=>{const manual=ref.startsWith('m:'),list=Number(x.quotationUnitPrice??x.unitPrice)||0,disc=Math.min(100,Math.max(0,Number(x.discount)||0)),qty=Number(x.quantity)||1,net=list*(1-disc/100),line=net*qty;total+=line;const name=manual?`<input style="width:100%;padding:8px" value="${esc(x.model||'')}" oninput="updateItem('${ref}','model',this.value,true)">`:`<div class="product-title">${esc(productTitle(x))}</div><div class="model-code">Model: ${esc(x.model||'')}</div>`;return `<tr class="product-name"><td class="price-cell" rowspan="3"><div class="item-actions"><button class="mini secondary" title="Move up" onclick="moveItem('${ref}',-1)" ${idx===0?'disabled':''}>↑</button><button class="mini secondary" title="Move down" onclick="moveItem('${ref}',1)" ${idx===ordered.length-1?'disabled':''}>↓</button>${manual?`<button class="mini danger" onclick="removeManual('${ref}')">Delete</button>`:''}</div></td><td>${name}${manual?'<span class="manual-badge">MANUAL</span>':''}</td><td class="price-cell" rowspan="3"><input class="num" type="number" min="0" step="1" value="${qty}" onchange="updateItem('${ref}','quantity',this.value)"></td><td class="price-cell" rowspan="3"><input class="num" type="number" step="0.01" value="${list}" onchange="updateItem('${ref}','quotationUnitPrice',this.value)"></td><td class="price-cell" rowspan="3"><input class="num" type="number" min="0" max="100" step="0.01" value="${disc}" onchange="updateItem('${ref}','discount',this.value)"></td><td class="price-cell" rowspan="3">${fmt(net)} ${q.currency||'EUR'}</td><td class="price-cell" rowspan="3"><b>${fmt(line)} ${q.currency||'EUR'}</b></td></tr><tr class="product-details"><td>${manual?`<input style="width:160px;padding:7px" placeholder="Unit (pcs, set, m...)" value="${esc(x.unit||'')}" oninput="updateItem('${ref}','unit',this.value,true)">`:esc(details(x))}</td></tr><tr class="product-note"><td><textarea placeholder="Optional product description or note..." oninput="updateItem('${ref}','manualNote',this.value,true)">${esc(x.manualNote||'')}</textarea></td></tr>`}).join('')}</tbody></table></div><div class="summary"><span>Grand Total: <b>${fmt(total)} ${q.currency||'EUR'}</b></span></div>`}function init(){const p=cur();if(!p){location.href='project.html';return}const q=ensureQuotation(p);quotationNo.value=q.quotationNo||((p.meta?.projectNo||'PRJ')+'-Q');quotationDate.value=q.date||new Date().toISOString().slice(0,10);validityDays.value=q.validityDays||30;currency.value=q.currency||'EUR';quotationNotes.value=q.notes||'';['quotationNo','quotationDate','validityDays','currency','quotationNotes'].forEach(id=>document.getElementById(id).addEventListener('change',()=>{persist();render()}));persist();render()}init();</script><script src="js/global-navigation.js"></script><script src="js/auth.js?v=20260714-auth1"></script></body></html>
